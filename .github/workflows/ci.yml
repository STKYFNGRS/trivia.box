name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # Cancel superseded runs on the same branch — no reason to pay for a
  # verify job on a commit the author has already amended past.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint + typecheck + vitest + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verify (lint + typecheck + vitest + build)
        run: npm run verify
        env:
          # The build step requires a non-empty value to reach Next's static
          # analysis. All other env vars either default safely or are read at
          # runtime, so the matrix below is the minimum to get `next build`
          # past client boundary validation.
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          # Keep Sentry / PostHog / Upstash unset → fail-open paths exercised.
